<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
position:relative;
}

.header h1{
margin:0;
font-size:26px;
}

.back{
position:absolute;
left:16px;
top:22px;
cursor:pointer;
display:none;
}

/* WISHLIST BUTTON */

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
display:none;
}

/* USER SELECT */

.users{
padding:30px;
display:flex;
flex-direction:column;
gap:16px;
max-width:420px;
margin:auto;
}

.user-btn{
padding:18px;
background:white;
border:none;
border-radius:16px;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
display:none;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,textarea,select{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* IMAGE PREVIEW */

.preview{
display:none;
position:relative;
margin-bottom:10px;
}

.preview img{
width:100%;
border-radius:10px;
}

.remove-img{
position:absolute;
right:10px;
top:10px;
background:#0008;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:85%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
transform:translateY(100%);
transition:transform .3s;
}

.popup.active{
transform:translateY(0);
}

.drag{
width:40px;
height:4px;
background:#ddd;
border-radius:10px;
margin:10px auto;
}

.list{
overflow:auto;
height:100%;
}

.item{
display:flex;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
}

.item img{
width:56px;
height:56px;
border-radius:10px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="header">

<div class="back" id="backBtn">← Back</div>

<h1 id="title">Wishlist</h1>

</div>

<div class="wishlist-btn" id="wishlistBtn" onclick="togglePopup()">
Danh sách mong muốn ❤️
</div>

<div class="users" id="users">

<button class="user-btn" onclick="selectUser('nhim')">
Nhím
</button>

<button class="user-btn" onclick="selectUser('an')">
An
</button>

</div>

<div class="container" id="form">

<div class="card">

<input id="name" placeholder="Tên món quà">

<textarea id="detail" placeholder="Chi tiết"></textarea>

<input type="file" id="imageInput">

<div class="preview" id="preview">
<img id="previewImg">
<button class="remove-img" onclick="removeImage()">✕</button>
</div>

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="popup" id="popup">

<div class="drag"></div>

<div id="list" class="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAUrHsJyOoyutwiTg9kSKxCiZX3E8U043w",
authDomain:"nhiman.firebaseapp.com",
databaseURL:"https://nhiman-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"nhiman",
storageBucket:"nhiman.firebasestorage.app",
messagingSenderId:"958208065341",
appId:"1:958208065341:web:1860b555603af5fb664f54"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()
const storage=firebase.storage()

let currentUser=null
let selectedFile=null

const list=document.getElementById("list")

function selectUser(user){

currentUser=user

document.getElementById("users").style.display="none"
document.getElementById("form").style.display="block"
document.getElementById("wishlistBtn").style.display="block"
document.getElementById("backBtn").style.display="block"

document.getElementById("title").innerText=
user==="nhim"?"Wishlist của Nhím":"Wishlist của An"

listenData()

}

document.getElementById("backBtn").onclick=()=>{

document.getElementById("users").style.display="flex"
document.getElementById("form").style.display="none"
document.getElementById("wishlistBtn").style.display="none"
document.getElementById("backBtn").style.display="none"

document.getElementById("title").innerText="Wishlist"

togglePopup(false)

}

function listenData(){

db.ref("wishlist/"+currentUser).on("value",snap=>{

list.innerHTML=""

snap.forEach(child=>{

const g=child.val()

const item=document.createElement("div")
item.className="item"

item.innerHTML=`
<img src="${g.image||''}">
<div>
<div><b>${g.name}</b></div>
<div>${g.detail||""}</div>
<div>${g.priority}</div>
</div>
`

list.appendChild(item)

})

})

}

function addGift(e){

const name=document.getElementById("name").value
const detail=document.getElementById("detail").value
const priority=document.getElementById("priority").value

if(!name)return

heartEffect(e)

if(selectedFile){

const path="images/"+Date.now()+"_"+selectedFile.name
const ref=storage.ref().child(path)

ref.put(selectedFile)
.then(()=>ref.getDownloadURL())
.then(url=>{
saveGift(name,detail,priority,url)
})
.catch(()=>{
saveGift(name,detail,priority,null)
})

}else{

saveGift(name,detail,priority,null)

}

}

function saveGift(name,detail,priority,image){

db.ref("wishlist/"+currentUser).push({
name,detail,priority,image
})

document.getElementById("name").value=""
document.getElementById("detail").value=""
removeImage()

}

function togglePopup(force){

let popup=document.getElementById("popup")

if(force===false){
popup.classList.remove("active")
return
}

popup.classList.toggle("active")

}

/* HEART */

function heartEffect(e){

let rect=e.target.getBoundingClientRect()

for(let i=0;i<6;i++){

let h=document.createElement("div")
h.innerHTML="❤️"
h.style.position="fixed"
h.style.left=(rect.left+Math.random()*40)+"px"
h.style.top=rect.top+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

}

/* IMAGE */

const imageInput=document.getElementById("imageInput")
const preview=document.getElementById("preview")
const previewImg=document.getElementById("previewImg")

imageInput.onchange=e=>{

selectedFile=e.target.files[0]

if(!selectedFile)return

const reader=new FileReader()

reader.onload=ev=>{
previewImg.src=ev.target.result
preview.style.display="block"
}

reader.readAsDataURL(selectedFile)

}

function removeImage(){

selectedFile=null
imageInput.value=""
preview.style.display="none"

}

/* DRAG CLOSE */

let popup=document.getElementById("popup")
let startY=0

popup.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

popup.addEventListener("touchend",e=>{

let move=e.changedTouches[0].clientY-startY

if(move>100){
togglePopup(false)
}

})

</script>

</body>
</html>
