<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
position:relative;
}

.header h1{
margin:0;
font-size:24px;
}

.back{
position:absolute;
left:16px;
top:22px;
font-size:14px;
cursor:pointer;
display:none;
}

/* USER SELECT */

.users{
padding:30px;
display:flex;
flex-direction:column;
gap:16px;
max-width:420px;
margin:auto;
}

.user-btn{
padding:18px;
background:white;
border:none;
border-radius:16px;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

/* BUTTON */

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
display:none;
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
display:none;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);

transform:translateY(100%);
transition:transform .35s cubic-bezier(.22,1,.36,1);
will-change:transform;
touch-action:none;
}

.popup.active{
transform:translateY(0);
}

.drag{
width:36px;
height:4px;
background:#ddd;
border-radius:10px;
margin:10px auto;
}

/* LIST */

.list{
overflow:auto;
height:100%;
padding-bottom:60px;
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
position:relative;
}

.item img{
width:56px;
height:56px;
object-fit:cover;
border-radius:10px;
}

.item-content{
flex:1;
}

.delete{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
display:none;
cursor:pointer;
}

.item.active .delete{
display:block;
}

/* HEART */

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:heartFly 1s ease forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(.4);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120px) scale(1.6);opacity:0;}
}

/* UNDO */

.undo{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:12px 16px;
border-radius:10px;
display:none;
}

.undo button{
background:none;
border:none;
color:#ffd479;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="back" id="backBtn" onclick="goBack()">← Back</div>

<h1 id="title">Wishlist</h1>

</div>

<div class="users" id="users">

<button class="user-btn" onclick="selectUser('nhim')">
Nhím
</button>

<button class="user-btn" onclick="selectUser('an')">
An
</button>

</div>

<div class="wishlist-btn" id="wishlistBtn" onclick="togglePopup()">
Danh sách mong muốn ❤️ (<span id="count">0</span>)
</div>

<div class="container" id="form">

<div class="card">

<input id="name" placeholder="Tên món quà">

<textarea id="detail" placeholder="Chi tiết"></textarea>

<input type="file" id="image">

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="popup" id="popup">

<div class="drag"></div>

<div id="list" class="list"></div>

</div>

<div class="undo" id="undoBar">
Đã xoá
<button onclick="undoDelete()">Hoàn tác</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyAUrHsJyOoyutwiTg9kSKxCiZX3E8U043w",
authDomain:"nhiman.firebaseapp.com",
databaseURL:"https://nhiman-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"nhiman",
storageBucket:"nhiman.firebasestorage.app",
messagingSenderId:"958208065341",
appId:"1:958208065341:web:1860b555603af5fb664f54"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const storage=getStorage(app)

let currentUser=null
let lastDeleted=null

window.selectUser=function(user){

currentUser=user

document.getElementById("users").style.display="none"
document.getElementById("form").style.display="block"
document.getElementById("wishlistBtn").style.display="block"
document.getElementById("backBtn").style.display="block"

document.getElementById("title").innerText=
user==="nhim"?"Wishlist của Nhím":"Wishlist của An"

loadData()

}

window.goBack=function(){

document.getElementById("users").style.display="flex"
document.getElementById("form").style.display="none"
document.getElementById("wishlistBtn").style.display="none"
document.getElementById("backBtn").style.display="none"

document.getElementById("title").innerText="Wishlist"

togglePopup(false)

}

function loadData(){

const list=document.getElementById("list")

onValue(ref(db,"wishlist/"+currentUser),snap=>{

list.innerHTML=""

let count=0

snap.forEach(child=>{

count++

let g=child.val()
let id=child.key

let div=document.createElement("div")

div.className="item"

div.innerHTML=`

<img src="${g.image||''}">

<div class="item-content">

<div><b>${g.name}</b></div>
<div>${g.detail||""}</div>
<div>${g.priority}</div>

</div>

<div class="delete">✕</div>

`

div.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"))
div.classList.add("active")
}

div.querySelector(".delete").onclick=(e)=>{

e.stopPropagation()

lastDeleted=g

remove(ref(db,"wishlist/"+currentUser+"/"+id))

document.getElementById("undoBar").style.display="block"

setTimeout(()=>{
document.getElementById("undoBar").style.display="none"
},4000)

}

list.appendChild(div)

})

document.getElementById("count").innerText=count

})

}

window.undoDelete=function(){

if(lastDeleted){

push(ref(db,"wishlist/"+currentUser),lastDeleted)

document.getElementById("undoBar").style.display="none"

}

}

window.addGift=function(e){

let rect=e.target.getBoundingClientRect()

for(let i=0;i<6;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=(rect.left+Math.random()*40)+"px"
h.style.top=rect.top+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

let name=document.getElementById("name").value
let detail=document.getElementById("detail").value
let priority=document.getElementById("priority").value
let file=document.getElementById("image").files[0]

if(!name)return

if(file){

let path="images/"+Date.now()+file.name
let imgRef=storageRef(storage,path)

uploadBytes(imgRef,file).then(()=>{

getDownloadURL(imgRef).then(url=>{

push(ref(db,"wishlist/"+currentUser),{
name,detail,priority,image:url
})

})

})

}else{

push(ref(db,"wishlist/"+currentUser),{
name,detail,priority
})

}

}

window.togglePopup=function(force){

let popup=document.getElementById("popup")

if(force===false){
popup.classList.remove("active")
return
}

popup.classList.toggle("active")

}

/* DRAG CLOSE */

let popup=document.getElementById("popup")

let startY=0
let currentY=0
let dragging=false

popup.addEventListener("touchstart",e=>{

startY=e.touches[0].clientY
dragging=true
popup.style.transition="none"

})

popup.addEventListener("touchmove",e=>{

if(!dragging)return

currentY=e.touches[0].clientY-startY

if(currentY>0){

popup.style.transform=`translateY(${currentY}px)`

}

})

popup.addEventListener("touchend",()=>{

dragging=false

popup.style.transition="transform .35s cubic-bezier(.22,1,.36,1)"

if(currentY>120){

popup.classList.remove("active")

}else{

popup.style.transform=""

}

currentY=0

})

</script>

</body>
</html>
