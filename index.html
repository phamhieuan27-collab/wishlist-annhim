<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist của Nhím</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
padding-top:env(safe-area-inset-top);
}

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
padding-top:calc(env(safe-area-inset-top) + 20px);
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
}

.header h1{
margin:0;
font-size:26px;
}

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
}

.container{
padding:20px;
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(6px);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
transform:translateY(100%);
transition:transform .35s cubic-bezier(.22,1,.36,1);
}

.popup.active{
transform:translateY(0);
}

.drag{
width:36px;
height:4px;
background:#ddd;
border-radius:10px;
margin:8px auto;
}

.popup-header{
text-align:center;
padding:10px;
font-weight:600;
border-bottom:1px solid #eee;
}

.tabs{
display:flex;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
}

.tab.active{
background:#f5efe6;
font-weight:600;
}

.list{
overflow:auto;
height:100%;
padding-bottom:60px;
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
position:relative;
}

.item img{
width:56px;
height:56px;
object-fit:cover;
border-radius:10px;
}

.item-content{
flex:1;
}

.item-name{
font-weight:600;
}

.item-detail{
opacity:.7;
font-size:14px;
}

.item a{
font-size:13px;
color:#a67c52;
text-decoration:none;
}

.delete{
position:absolute;
right:4px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
font-size:18px;
display:none;
cursor:pointer;
}

.item.active .delete{
display:block;
}

.undo{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:12px 16px;
border-radius:10px;
display:none;
}

.undo button{
background:none;
border:none;
color:#ffd479;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h1>Wishlist của Nhím</h1>
<div>Mọi điều em muốn, anh sẽ nhớ 🤍</div>
</div>

<div class="wishlist-btn" onclick="togglePopup()">
Danh sách mong muốn ❤️ (<span id="count">0</span>)
</div>

<div class="container">

<div class="card">

<label>Tên món quà</label> <input id="name">

<label>Cụ thể</label>

<textarea id="detail"></textarea>

<label>Link sản phẩm</label> <input id="link" placeholder="Shopee / TikTok / Web...">

<label>Hình ảnh</label> <input type="file" id="image">

<label>Độ ưu tiên</label> <select id="priority">

<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">

<div class="drag"></div>

<div class="popup-header">
Wishlist
</div>

<div class="tabs">

<div class="tab active" onclick="switchTab('all',event)">Tất cả</div>
<div class="tab" onclick="switchTab('🥰',event)">🥰</div>
<div class="tab" onclick="switchTab('🤭',event)">🤭</div>
<div class="tab" onclick="switchTab('🙄',event)">🙄</div>

</div>

<div id="list" class="list"></div>

</div>

<div class="undo" id="undoBar">
Đã xoá
<button onclick="undoDelete()">Hoàn tác</button>
</div>

<script>

let gifts=JSON.parse(localStorage.getItem("wishlist"))||[]
let currentTab="all"

let lastDeleted=null
let lastIndex=null

const list=document.getElementById("list")
const popup=document.getElementById("popup")
const overlay=document.getElementById("overlay")
const undoBar=document.getElementById("undoBar")

function createItem(g,i){

let item=document.createElement("div")
item.className="item"

let imgHTML = g.image ? `<img src="${g.image}">` : ""
let linkHTML = g.link ? `<div class="item-detail"><a href="${g.link}" target="_blank">Xem sản phẩm</a></div>` : ""

item.innerHTML=`

${imgHTML}

<div class="item-content">

<div class="item-name">${g.name}</div>
<div class="item-detail">${g.detail||""}</div>
${linkHTML}
<div class="item-priority">${g.priority}</div>

</div>

<button class="delete">✕</button>

`

item.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"))
item.classList.add("active")
}

item.querySelector(".delete").onclick=(e)=>{
e.stopPropagation()
removeGift(i,item)
}

return item

}

function render(){

list.innerHTML=""
document.getElementById("count").innerText=gifts.length

gifts.forEach((g,i)=>{

if(currentTab!=="all" && !g.priority.includes(currentTab)) return

list.appendChild(createItem(g,i))

})

}

function addGift(e){

let name=document.getElementById("name").value
let detail=document.getElementById("detail").value
let priority=document.getElementById("priority").value
let link=document.getElementById("link").value
let file=document.getElementById("image").files[0]

if(!name)return

if(file){

let reader=new FileReader()

reader.onload=function(ev){
saveGift(name,detail,priority,ev.target.result,link)
}

reader.readAsDataURL(file)

}else{
saveGift(name,detail,priority,null,link)
}

}

function saveGift(name,detail,priority,image,link){

gifts.push({name,detail,priority,image,link})

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

document.getElementById("name").value=""
document.getElementById("detail").value=""
document.getElementById("image").value=""
document.getElementById("link").value=""
document.getElementById("priority").selectedIndex=0

}

function removeGift(i,item){

lastDeleted=gifts[i]
lastIndex=i

gifts.splice(i,1)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

undoBar.style.display="block"

setTimeout(()=>undoBar.style.display="none",4000)

}

function undoDelete(){

if(lastDeleted){

gifts.splice(lastIndex,0,lastDeleted)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

undoBar.style.display="none"

}

}

function togglePopup(){

popup.classList.toggle("active")
overlay.classList.toggle("active")

}

overlay.onclick=togglePopup

function switchTab(tab,e){

currentTab=tab

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

e.target.classList.add("active")

render()

}

render()

</script>

</body>
</html>
