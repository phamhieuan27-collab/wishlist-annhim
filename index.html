<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wishlist</title>

<style>

body{
font-family:-apple-system;
margin:0;
background:#f5f5f5;
}

.header{
background:#e9ddc9;
padding:30px;
text-align:center;
}

.users{
padding:40px;
display:flex;
flex-direction:column;
gap:20px;
max-width:400px;
margin:auto;
}

.user-btn{
padding:20px;
font-size:20px;
background:white;
border:none;
border-radius:16px;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-radius:20px 20px 0 0;
transform:translateY(100%);
transition:0.3s;
}

.popup.active{
transform:translateY(0);
}

.form{
padding:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

.list{
padding:10px;
overflow:auto;
height:55%;
}

.item{
display:flex;
gap:10px;
padding:10px;
border-bottom:1px solid #eee;
position:relative;
}

.item img{
width:50px;
height:50px;
border-radius:8px;
object-fit:cover;
}

.delete{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
display:none;
}

.item.active .delete{
display:block;
}

</style>
</head>

<body>

<div class="header">
<h2>Wishlist</h2>
<div>WISHLIST</div>
</div>

<div class="users">
<button class="user-btn" onclick="openList('nhim')">Nhím</button>
<button class="user-btn" onclick="openList('an')">An</button>
</div>

<div class="popup" id="popup">

<div style="text-align:center;padding:15px;font-weight:600" id="title"></div>

<div class="form">

<input id="name" placeholder="Tên quà">

<textarea id="detail" placeholder="Chi tiết"></textarea>

<input type="file" id="image">

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift()">Thêm vào Wishlist</button>

</div>

<div class="list" id="list"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyAUrHsJyOoyutwiTg9kSKxCiZX3E8U043w",
authDomain: "nhiman.firebaseapp.com",
databaseURL: "https://nhiman-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "nhiman",
storageBucket: "nhiman.firebasestorage.app",
messagingSenderId: "958208065341",
appId: "1:958208065341:web:1860b555603af5fb664f54",
measurementId: "G-96QS7R0Y35"
};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let currentUser="nhim";


window.openList=function(user){

currentUser=user;

document.getElementById("popup").classList.add("active");

document.getElementById("title").innerText=
user==="nhim"?"Wishlist của Nhím":"Wishlist của An";

loadData();

}


function loadData(){

const list=document.getElementById("list");

onValue(ref(db,"wishlist/"+currentUser),snap=>{

list.innerHTML="";

snap.forEach(child=>{

let g=child.val();
let id=child.key;

let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<img src="${g.image||''}">
<div>
<b>${g.name}</b><br>
${g.detail||""}<br>
${g.priority}
</div>
<div class="delete">✕</div>
`;

div.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
div.classList.add("active");
}

div.querySelector(".delete").onclick=(e)=>{
e.stopPropagation();
remove(ref(db,"wishlist/"+currentUser+"/"+id));
}

list.appendChild(div);

});

});

}


window.addGift=function(){

let name=document.getElementById("name").value;
let detail=document.getElementById("detail").value;
let priority=document.getElementById("priority").value;
let file=document.getElementById("image").files[0];

if(!name) return;


if(file){

let path="images/"+Date.now()+file.name;
let imgRef=storageRef(storage,path);

uploadBytes(imgRef,file).then(()=>{

getDownloadURL(imgRef).then(url=>{

push(ref(db,"wishlist/"+currentUser),{
name,
detail,
priority,
image:url
});

});

});

}else{

push(ref(db,"wishlist/"+currentUser),{
name,
detail,
priority
});

}

}

</script>

</body>
</html>
