<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlist</title>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:#f3eee7;
}

/* HEADER */

.header{
  background:#e8dccb;
  padding:30px;
  text-align:center;
}

.users{
  padding:40px;
  display:flex;
  flex-direction:column;
  gap:20px;
  max-width:400px;
  margin:auto;
}

.user-btn{
  padding:20px;
  font-size:20px;
  background:white;
  border:none;
  border-radius:16px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* POPUP */

.popup{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:90%;
  background:white;
  border-radius:20px 20px 0 0;
  transform:translateY(100%);
  transition:.3s;
}

.popup.active{
  transform:translateY(0);
}

/* FORM */

.form{
  padding:20px;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

/* LIST */

.list{
  padding:10px;
  overflow:auto;
  height:50%;
}

.item{
  display:flex;
  gap:10px;
  border-bottom:1px solid #eee;
  padding:10px;
  position:relative;
}

.item img{
  width:50px;
  height:50px;
  border-radius:8px;
  object-fit:cover;
}

.delete{
  position:absolute;
  right:5px;
  top:50%;
  transform:translateY(-50%);
  display:none;
  cursor:pointer;
}

.item.active .delete{
  display:block;
}
</style>

</head>

<body>

<div class="header">
<h1>Wishlist</h1>
<div>Mọi thứ v muốn, c sẽ nhớ</div>
</div>

<div class="users">
<button class="user-btn" onclick="openList('nhim')">Nhím</button>
<button class="user-btn" onclick="openList('an')">An</button>
</div>

<div class="popup" id="popup">

<div style="text-align:center;padding:10px;font-weight:600" id="title"></div>

<div class="form">

<input id="name" placeholder="Tên quà">

<textarea id="detail" placeholder="Chi tiết"></textarea>

<input type="file" id="image">

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift()">Thêm</button>

</div>

<div class="list" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getStorage,
ref as storageRef,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* CONFIG CỦA MÀY */

const firebaseConfig = {
  apiKey: "AIzaSyAUrHsJyOoyutwiTg9kSKxCiZX3E8U043w",
  authDomain: "nhiman.firebaseapp.com",
  projectId: "nhiman",
  storageBucket: "nhiman.firebasestorage.app",
  messagingSenderId: "958208065341",
  appId: "1:958208065341:web:1860b555603af5fb664f54",
  measurementId: "G-96QS7R0Y35",

  /* nếu mày chưa có databaseURL thì code tự suy ra */
  databaseURL: "https://nhiman-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let currentUser="nhim";

function openList(user){

currentUser=user;

document.getElementById("popup").classList.add("active");

document.getElementById("title").innerText=
user==="nhim"?"Wishlist của Nhím":"Wishlist của An";

loadData();

}

function loadData(){

const list=document.getElementById("list");

onValue(ref(db,"wishlist/"+currentUser),snap=>{

list.innerHTML="";

snap.forEach(child=>{

let g=child.val();
let id=child.key;

let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<img src="${g.image||''}">
<div>
<b>${g.name}</b><br>
${g.detail}<br>
${g.priority}
</div>
<button class="delete">✕</button>
`;

div.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
div.classList.add("active");
};

div.querySelector(".delete").onclick=(e)=>{
e.stopPropagation();
remove(ref(db,"wishlist/"+currentUser+"/"+id));
};

list.appendChild(div);

});

});

}

window.addGift=function(){

let name=document.getElementById("name").value;
let detail=document.getElementById("detail").value;
let priority=document.getElementById("priority").value;
let file=document.getElementById("image").files[0];

if(file){

let path="images/"+Date.now()+file.name;
let imgRef=storageRef(storage,path);

uploadBytes(imgRef,file).then(()=>{

getDownloadURL(imgRef).then(url=>{

push(ref(db,"wishlist/"+currentUser),{
name,
detail,
priority,
image:url
});

});

});

}else{

push(ref(db,"wishlist/"+currentUser),{
name,
detail,
priority
});

}

}

</script>

</body>
</html>
