<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist của Nhím</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
padding-top:env(safe-area-inset-top);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
padding-top:calc(env(safe-area-inset-top) + 20px);
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
}

.header h1{
margin:0;
font-size:26px;
}

/* BUTTON */

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* PREVIEW */

.preview{
width:100%;
margin-bottom:12px;
display:none;
}

.preview img{
width:100%;
border-radius:10px;
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(6px);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* POPUP */

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
transform:translateY(100%);
transition:transform .35s cubic-bezier(.22,1,.36,1);
will-change:transform;
}

.popup.active{
transform:translateY(0);
}

/* DRAG BAR */

.drag{
width:36px;
height:4px;
background:#ddd;
border-radius:10px;
margin:8px auto;
}

/* HEADER */

.popup-header{
text-align:center;
padding:10px;
font-weight:600;
border-bottom:1px solid #eee;
}

/* TABS */

.tabs{
display:flex;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
}

.tab.active{
background:#f5efe6;
font-weight:600;
}

/* LIST */

.list{
overflow:auto;
height:100%;
padding-bottom:60px;
}

/* ITEM */

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
position:relative;
opacity:0;
transform:translateY(20px);
animation:itemIn .35s forwards;
}

@keyframes itemIn{
to{
opacity:1;
transform:translateY(0);
}
}

.item img{
width:56px;
height:56px;
object-fit:cover;
border-radius:10px;
}

.item-content{
flex:1;
}

.item-name{
font-weight:600;
}

.item-detail{
opacity:.7;
font-size:14px;
}

.item-priority{
font-size:14px;
margin-top:2px;
}

/* DELETE */

.delete{
position:absolute;
right:4px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
font-size:18px;
display:none;
cursor:pointer;
}

.item.active .delete{
display:block;
}

/* BREAK */

.item.break{
animation:break .35s forwards;
}

@keyframes break{
to{
opacity:0;
transform:scale(.7) rotate(6deg);
}
}

/* HEART */

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:heartFly 1s ease forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(.4);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120px) scale(1.6);opacity:0;}
}

/* UNDO */

.undo{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:12px 16px;
border-radius:10px;
display:none;
}

.undo button{
background:none;
border:none;
color:#ffd479;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h1>Wishlist của Nhím</h1>
<div>Mọi điều v muốn, c sẽ nhớ 🤍</div>
</div>

<div class="wishlist-btn" onclick="togglePopup()">
Danh sách mong muốn ❤️ (<span id="count">0</span>)
</div>

<div class="container">

<div class="card">

<label>Tên món quà</label> 
<input id="name">

<label>Cụ thể</label>
<textarea id="detail"></textarea>

<label>Hình ảnh</label> 
<input type="file" id="image">

<div class="preview" id="preview">
<img id="previewImg">
</div>

<label>Độ ưu tiên</label>

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">

<div class="drag"></div>

<div class="popup-header">
Wishlist
</div>

<div class="tabs">

<div class="tab active" onclick="switchTab('all',event)">Tất cả</div>
<div class="tab" onclick="switchTab('🥰',event)">🥰</div>
<div class="tab" onclick="switchTab('🤭',event)">🤭</div>
<div class="tab" onclick="switchTab('🙄',event)">🙄</div>

</div>

<div id="list" class="list"></div>

</div>

<div class="undo" id="undoBar">
Đã xoá
<button onclick="undoDelete()">Hoàn tác</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJPXV8hucwbSYgtdAlxeD5ykTr_QHGTik",
  authDomain: "annhim.firebaseapp.com",
  projectId: "annhim",
  storageBucket: "annhim.firebasestorage.app",
  messagingSenderId: "838923299040",
  appId: "1:838923299040:web:6290d516cb632ea0624885"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const roomId = "annhim";
const giftsRef = collection(db, "wishlist", roomId, "items");

let gifts=JSON.parse(localStorage.getItem("wishlist"))||[]
let currentTab="all"

let lastDeleted=null
let lastIndex=null

const list=document.getElementById("list")
const popup=document.getElementById("popup")
const overlay=document.getElementById("overlay")
const undoBar=document.getElementById("undoBar")

/* IMAGE PREVIEW */

document.getElementById("image").addEventListener("change",function(){

let file=this.files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("previewImg").src=e.target.result
document.getElementById("preview").style.display="block"

}

reader.readAsDataURL(file)

})

/* HEART */

function heartEffect(x,y){

for(let i=0;i<6;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=(x+Math.random()*40-20)+"px"
h.style.top=(y+Math.random()*10)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

}

/* CREATE ITEM */

function createItem(g,i){

let item=document.createElement("div")
item.className="item"
item.style.animationDelay=i*0.04+"s"

item.innerHTML=`
${g.image?`<img src="${g.image}">`:""}
<div class="item-content">
<div class="item-name">${g.name}</div>
<div class="item-detail">${g.detail||""}</div>
<div class="item-priority">${g.priority}</div>
</div>
<button class="delete">✕</button>
`

item.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"))
item.classList.add("active")
}

item.querySelector(".delete").onclick=(e)=>{
e.stopPropagation()
removeGift(g.id,item)
}

return item

}

/* RENDER */

function render(){

list.innerHTML=""

document.getElementById("count").innerText=gifts.length

gifts.forEach((g,i)=>{

if(currentTab!=="all" && !g.priority.includes(currentTab)) return

list.appendChild(createItem(g,i))

})

}

/* ADD */

async function addGift(e){

let rect=e.target.getBoundingClientRect()
heartEffect(rect.left+rect.width/2,rect.top)

let name=document.getElementById("name").value
let detail=document.getElementById("detail").value
let priority=document.getElementById("priority").value
let file=document.getElementById("image").files[0]

if(!name)return

if(file){

resizeImage(file,800,async function(img){

  await saveGift(name,detail,priority,img)

})

}else{

await saveGift(name,detail,priority,null)

}

}  
/* RESIZE IMAGE */

function resizeImage(file,max,callback){

let img=new Image()
let reader=new FileReader()

reader.onload=function(e){

img.src=e.target.result

}

img.onload=function(){

let canvas=document.createElement("canvas")
let scale=max/img.width

canvas.width=max
canvas.height=img.height*scale

let ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0,canvas.width,canvas.height)

callback(canvas.toDataURL("image/jpeg",0.8))

}

reader.readAsDataURL(file)

}

/* SAVE */
  
async function saveGift(name,detail,priority,image){

  try{

    let docRef = await addDoc(giftsRef,{
      name,
      detail,
      priority,
      image,
      createdAt: Date.now()
    })

    gifts.push({
      id: docRef.id,
      name,
      detail,
      priority,
      image
    })

    render()

    console.log("OK")

    document.getElementById("name").value=""
    document.getElementById("detail").value=""
    document.getElementById("image").value=""
    document.getElementById("preview").style.display="none"

  }catch(err){

    console.error("Firebase lỗi:",err)

  }

}

/* DELETE */

function removeGift(id,item){

let index=gifts.findIndex(g=>g.id===id)

lastDeleted=gifts[index]
lastIndex=index

item.classList.add("break")

setTimeout(()=>{

gifts.splice(index,1)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

undoBar.style.display="block"

setTimeout(()=>undoBar.style.display="none",4000)

},300)

}

function undoDelete(){

if(lastDeleted){

gifts.splice(lastIndex,0,lastDeleted)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

undoBar.style.display="none"

}

}

/* POPUP */

function togglePopup(){

popup.classList.toggle("active")
overlay.classList.toggle("active")

}

/* DRAG */

let startY=0

popup.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

popup.addEventListener("touchmove",e=>{

let move=e.touches[0].clientY-startY

if(move>0){
popup.style.transform=`translateY(${move}px)`
}

})

popup.addEventListener("touchend",e=>{

let move=e.changedTouches[0].clientY-startY

if(move>120){
togglePopup()
}

popup.style.transform=""

})

overlay.onclick=togglePopup

function switchTab(tab,e){

currentTab=tab

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

e.target.classList.add("active")

render()

}
onSnapshot(giftsRef,(snapshot)=>{

gifts=[]

snapshot.forEach(doc=>{
gifts.push({id:doc.id,...doc.data()})
})

render()

})

render()

</script>

</body>
</html>
