<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Wishlist</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
position:relative;
}

.header h1{
margin:0;
font-size:26px;
}

.back{
position:absolute;
left:16px;
top:22px;
cursor:pointer;
display:none;
}

/* BUTTON */

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
display:none;
}

/* USER */

.users{
padding:30px;
display:flex;
flex-direction:column;
gap:16px;
max-width:420px;
margin:auto;
}

.user-btn{
padding:18px;
background:white;
border:none;
border-radius:16px;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
display:none;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,textarea,select{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* IMAGE */

.preview{
display:none;
position:relative;
margin-bottom:10px;
}

.preview img{
width:100%;
border-radius:10px;
}

.remove-img{
position:absolute;
right:10px;
top:10px;
background:#0008;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
transform:translateY(100%);
transition:transform .35s cubic-bezier(.22,1,.36,1);
}

.popup.active{
transform:translateY(0);
}

.drag{
width:40px;
height:4px;
background:#ddd;
border-radius:10px;
margin:10px auto;
}

/* TABS */

.tabs{
display:flex;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
}

.tab.active{
background:#f5efe6;
font-weight:600;
}

/* LIST */

.list{
overflow:auto;
height:100%;
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
position:relative;
background:white;
transition:.25s;
}

.item img{
width:56px;
height:56px;
border-radius:10px;
object-fit:cover;
}

.item-content{
flex:1;
}

/* DELETE */

.delete{
position:absolute;
right:-80px;
top:0;
bottom:0;
width:80px;
background:#ff3b30;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

/* BREAK */

.item.break{
transform:scale(.7) rotate(6deg);
opacity:0;
}

/* UNDO */

.undo{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:12px 16px;
border-radius:10px;
display:none;
}

.undo button{
background:none;
border:none;
color:#ffd479;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="back" id="backBtn">← Back</div>

<h1 id="title">Wishlist</h1>

</div>

<div class="wishlist-btn" id="wishlistBtn" onclick="togglePopup()">
Danh sách mong muốn ❤️
</div>

<div class="users" id="users">

<button class="user-btn" onclick="selectUser('nhim')">Nhím</button> <button class="user-btn" onclick="selectUser('an')">An</button>

</div>

<div class="container" id="form">

<div class="card">

<input id="name" placeholder="Tên món quà">

<textarea id="detail" placeholder="Chi tiết"></textarea>

<input type="file" id="imageInput">

<div class="preview" id="preview">
<img id="previewImg">
<button class="remove-img" onclick="removeImage()">✕</button>
</div>

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift()">Thêm vào Wishlist</button>

</div>

</div>

<div class="popup" id="popup">

<div class="drag"></div>

<div class="tabs">
<div class="tab active" onclick="switchTab('all',event)">Tất cả</div>
<div class="tab" onclick="switchTab('🥰',event)">🥰</div>
<div class="tab" onclick="switchTab('🤭',event)">🤭</div>
<div class="tab" onclick="switchTab('🙄',event)">🙄</div>
</div>

<div id="list" class="list"></div>

</div>

<div class="undo" id="undoBar">
Đã xoá
<button onclick="undoDelete()">Hoàn tác</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAUrHsJyOoyutwiTg9kSKxCiZX3E8U043w",
authDomain:"nhiman.firebaseapp.com",
databaseURL:"https://nhiman-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"nhiman",
storageBucket:"nhiman.firebasestorage.app",
messagingSenderId:"958208065341",
appId:"1:958208065341:web:1860b555603af5fb664f54"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()
const storage=firebase.storage()

let currentUser=null
let gifts=[]
let lastDeleted=null

const list=document.getElementById("list")

function selectUser(user){

currentUser=user

document.getElementById("users").style.display="none"
document.getElementById("form").style.display="block"
document.getElementById("wishlistBtn").style.display="block"
document.getElementById("backBtn").style.display="block"

listenData()

}

document.getElementById("backBtn").onclick=()=>{

document.getElementById("users").style.display="flex"
document.getElementById("form").style.display="none"
document.getElementById("wishlistBtn").style.display="none"
document.getElementById("backBtn").style.display="none"

togglePopup(false)

}

function listenData(){

db.ref("wishlist/"+currentUser).on("value",snap=>{

gifts=[]

snap.forEach(child=>{
let g=child.val()
g.id=child.key
gifts.push(g)
})

render()

})

}

function render(){

list.innerHTML=""

gifts.forEach(g=>{

let item=document.createElement("div")
item.className="item"

item.innerHTML=`
<img src="${g.image||''}">
<div class="item-content">
<div><b>${g.name}</b></div>
<div>${g.detail||""}</div>
<div>${g.priority}</div>
</div>
<div class="delete">Xoá</div>
`

item.querySelector(".delete").onclick=()=>{

lastDeleted=g

item.classList.add("break")

setTimeout(()=>{

db.ref("wishlist/"+currentUser+"/"+g.id).remove()

showUndo()

},250)

}

list.appendChild(item)

})

}

function showUndo(){

const bar=document.getElementById("undoBar")

bar.style.display="block"

setTimeout(()=>bar.style.display="none",4000)

}

function undoDelete(){

if(lastDeleted){

db.ref("wishlist/"+currentUser).push(lastDeleted)

document.getElementById("undoBar").style.display="none"

}

}

function togglePopup(force){

let popup=document.getElementById("popup")

if(force===false){
popup.classList.remove("active")
return
}

popup.classList.toggle("active")

}

</script>

</body>
</html>
