<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
}

.header h1{
margin:0;
}

/* SELECT USER */

.users{
padding:30px;
display:flex;
flex-direction:column;
gap:15px;
max-width:400px;
margin:auto;
}

.user-btn{
padding:16px;
background:white;
border:none;
border-radius:16px;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

/* BACK */

.back{
position:absolute;
left:15px;
top:18px;
font-size:14px;
cursor:pointer;
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
display:none;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
transform:translateY(100%);
transition:.35s;
}

.popup.active{
transform:translateY(0);
}

.list{
overflow:auto;
height:100%;
padding-bottom:60px;
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
position:relative;
}

.item img{
width:56px;
height:56px;
border-radius:10px;
object-fit:cover;
}

.item-content{
flex:1;
}

.delete{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
display:none;
cursor:pointer;
}

.item.active .delete{
display:block;
}

/* HEART */

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:heartFly 1s ease forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(.4);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120px) scale(1.6);opacity:0;}
}

</style>

</head>

<body>

<div class="header">
<h1 id="title">Wishlist</h1>
<div id="backBtn" class="back" onclick="goBack()" style="display:none">← Back</div>
</div>

<div class="users" id="users">

<button class="user-btn" onclick="selectUser('nhim')">
Nhím
</button>

<button class="user-btn" onclick="selectUser('an')">
An
</button>

</div>

<div class="container" id="form">

<div class="card">

<input id="name" placeholder="Tên món quà">

<textarea id="detail" placeholder="Chi tiết"></textarea>

<input type="file" id="image">

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="popup" id="popup">
<div id="list" class="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {

apiKey:"AIzaSyAUrHsJyOoyutwiTg9kSKxCiZX3E8U043w",
authDomain:"nhiman.firebaseapp.com",
databaseURL:"https://nhiman-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"nhiman",
storageBucket:"nhiman.firebasestorage.app",
messagingSenderId:"958208065341",
appId:"1:958208065341:web:1860b555603af5fb664f54"

}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const storage=getStorage(app)

let currentUser=null

window.selectUser=function(user){

currentUser=user

document.getElementById("users").style.display="none"
document.getElementById("form").style.display="block"
document.getElementById("popup").classList.add("active")

document.getElementById("backBtn").style.display="block"

document.getElementById("title").innerText=
user==="nhim"?"Wishlist của Nhím":"Wishlist của An"

loadData()

}

window.goBack=function(){

document.getElementById("users").style.display="flex"
document.getElementById("form").style.display="none"
document.getElementById("popup").classList.remove("active")
document.getElementById("backBtn").style.display="none"

document.getElementById("title").innerText="Wishlist"

}

function loadData(){

const list=document.getElementById("list")

onValue(ref(db,"wishlist/"+currentUser),snap=>{

list.innerHTML=""

snap.forEach(child=>{

let g=child.val()
let id=child.key

let div=document.createElement("div")

div.className="item"

div.innerHTML=`

<img src="${g.image||''}">

<div class="item-content">

<div><b>${g.name}</b></div>
<div>${g.detail||""}</div>
<div>${g.priority}</div>

</div>

<div class="delete">✕</div>

`

div.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"))
div.classList.add("active")
}

div.querySelector(".delete").onclick=(e)=>{
e.stopPropagation()
remove(ref(db,"wishlist/"+currentUser+"/"+id))
}

list.appendChild(div)

})

})

}

window.addGift=function(e){

let rect=e.target.getBoundingClientRect()

for(let i=0;i<6;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=(rect.left+Math.random()*40)+"px"
h.style.top=rect.top+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

let name=document.getElementById("name").value
let detail=document.getElementById("detail").value
let priority=document.getElementById("priority").value
let file=document.getElementById("image").files[0]

if(!name)return

if(file){

let path="images/"+Date.now()+file.name
let imgRef=storageRef(storage,path)

uploadBytes(imgRef,file).then(()=>{

getDownloadURL(imgRef).then(url=>{

push(ref(db,"wishlist/"+currentUser),{
name,detail,priority,image:url
})

})

})

}else{

push(ref(db,"wishlist/"+currentUser),{
name,detail,priority
})

}

}

</script>

</body>
</html>
