<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist của Nhím</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Wishlist">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
padding-top:env(safe-area-inset-top);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
padding-top:calc(env(safe-area-inset-top) + 20px);
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
}

.header h1{
margin:0;
font-size:26px;
}

/* BUTTON */

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* IMAGE */

.preview img{
width:90px;
border-radius:10px;
margin-bottom:10px;
}

/* POPUP */

.popup{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);
transition:.35s cubic-bezier(.22,1,.36,1);
overflow:auto;
}

.popup.active{
bottom:0;
}

/* DRAG HANDLE */

.popup::before{
content:"";
width:36px;
height:5px;
background:#ddd;
border-radius:10px;
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
}

/* POPUP HEADER */

.popup-header{
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding:14px;
border-bottom:1px solid #eee;
font-weight:600;
}

.popup-title{
text-align:center;
}

.close{
position:absolute;
right:16px;
background:none;
border:none;
font-size:15px;
cursor:pointer;
color:#999;
}

/* TABS */

.tabs{
display:flex;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
}

.tab.active{
background:#f5efe6;
font-weight:600;
}

/* LIST */

.list{
padding-bottom:40px;
}

/* ITEM */

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 16px;
border-bottom:1px solid #eee;
position:relative;
}

.item img{
width:56px;
height:56px;
object-fit:cover;
border-radius:10px;
flex-shrink:0;
}

.item-content{
flex:1;
min-width:0;
}

.item-name{
font-weight:600;
}

.item-detail{
opacity:.7;
font-size:14px;
}

.item-priority{
font-size:14px;
margin-top:2px;
}

/* DELETE BUTTON */

.delete{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
font-size:16px;
color:#bbb;
cursor:pointer;
}

/* HEART EFFECT */

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:heartFly 1.2s ease forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(.5);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-150px) scale(1.8);opacity:0;}
}

</style>

</head>

<body>

<div class="header">

<h1>Wishlist của Nhím</h1>
<div>Mọi điều em muốn, anh sẽ nhớ 🤍</div>

</div>

<div class="wishlist-btn" onclick="togglePopup()">

Danh sách mong muốn ❤️ (<span id="count">0</span>)

</div>

<div class="container">

<div class="card">

<label>Tên món quà</label> <input id="name">

<label>Cụ thể (loại, brand, link...)</label>

<textarea id="detail"></textarea>

<label>Hình ảnh</label> <input type="file" id="image" onchange="previewImage(event)">

<div class="preview" id="preview"></div>

<label>Danh mục</label>

<select id="category">

<option>Couple</option>
<option>Mỹ phẩm</option>
<option>Thời trang</option>
<option>Du lịch</option>
<option>Khác</option>

</select>

<label>Độ ưu tiên</label>

<select id="priority">

<option value="low">🙄 Ước thôi</option>
<option value="medium">🤭 Thích nha</option>
<option value="high">🥰 Muốn lắm</option>

</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-header">

<div class="popup-title">Wishlist</div>

<button class="close" onclick="togglePopup()">Đóng</button>

</div>

<div class="tabs">

<div class="tab active" onclick="switchTab('all',event)">Tất cả</div>
<div class="tab" onclick="switchTab('🥰',event)">🥰</div>
<div class="tab" onclick="switchTab('🤭',event)">🤭</div>
<div class="tab" onclick="switchTab('🙄',event)">🙄</div>

</div>

<div id="list" class="list"></div>

</div>

<script>

let gifts=JSON.parse(localStorage.getItem("wishlist")) || []
let currentTab="all"
const list=document.getElementById("list")

/* HEART EFFECT */

function heartEffect(x,y){

for(let i=0;i<6;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=(x + Math.random()*40-20)+"px"
h.style.top=(y + Math.random()*10)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1200)

}

}

/* CREATE ITEM */

function createItem(g,i){

let item=document.createElement("div")
item.className="item"

item.innerHTML=`

<img src="${g.image || ''}">

<div class="item-content">

<div class="item-name">${g.name}</div>
<div class="item-detail">${g.detail || ""}</div>
<div class="item-priority">${g.priority}</div>

</div>

<button class="delete">✕</button>

`

item.querySelector(".delete").onclick=()=>removeGift(i,item)

return item

}

/* RENDER */

function render(){

list.innerHTML=""

document.getElementById("count").innerText=gifts.length

gifts.forEach((g,i)=>{

if(currentTab!=="all" && !g.priority.includes(currentTab)) return

list.appendChild(createItem(g,i))

})

}

/* IMAGE PREVIEW */

function previewImage(e){

let reader=new FileReader()

reader.onload=function(ev){

document.getElementById("preview").innerHTML="<img src='"+ev.target.result+"'>"

}

reader.readAsDataURL(e.target.files[0])

}

/* ADD */

function addGift(e){

let rect=e.target.getBoundingClientRect()

heartEffect(rect.left+rect.width/2,rect.top)

let name=document.getElementById("name").value
let detail=document.getElementById("detail").value
let priority=document.getElementById("priority").selectedOptions[0].text
let file=document.getElementById("image").files[0]

if(!name) return

if(file){

let reader=new FileReader()

reader.onload=function(ev){

saveGift(name,detail,priority,ev.target.result)

}

reader.readAsDataURL(file)

}else{

saveGift(name,detail,priority,null)

}

}

function saveGift(name,detail,priority,image){

gifts.push({name,detail,priority,image})

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

document.getElementById("name").value=""
document.getElementById("detail").value=""
document.getElementById("image").value=""
document.getElementById("preview").innerHTML=""

}

/* REMOVE */

function removeGift(i,item){

item.style.opacity="0"

setTimeout(()=>{

gifts.splice(i,1)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

},250)

}

/* POPUP */

const popup=document.getElementById("popup")

let startY=0

popup.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

popup.addEventListener("touchmove",e=>{

let move=e.touches[0].clientY-startY

if(move>0){
popup.style.transform=`translateY(${move}px)`
}

})

popup.addEventListener("touchend",e=>{

let move=e.changedTouches[0].clientY-startY

if(move>120){
togglePopup()
}

popup.style.transform=""

})

function togglePopup(){

popup.classList.toggle("active")

}

/* TAB */

function switchTab(tab,e){

currentTab=tab

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

e.target.classList.add("active")

render()

}

render()

</script>

</body>
</html>
