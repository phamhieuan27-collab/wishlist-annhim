<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Wishlist của Nhím</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Wishlist">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f3eee7;
color:#4a4036;
padding-top:env(safe-area-inset-top);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#e8dccb,#d6c2a5);
padding:20px;
padding-top:calc(env(safe-area-inset-top) + 20px);
text-align:center;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
}

.header h1{
margin:0;
font-size:26px;
}

/* BUTTON */

.wishlist-btn{
background:#fff;
padding:14px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* FORM */

.container{
padding:20px;
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#cbb79a;
font-size:16px;
cursor:pointer;
}

/* POPUP */

.popup{

position:fixed;
bottom:0;
left:0;
width:100%;
height:90%;
background:white;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 30px rgba(0,0,0,0.2);

transform:translateY(100%);
transition:transform .35s cubic-bezier(.22,1,.36,1);

will-change:transform;

}

.popup.active{
transform:translateY(0);
}

/* HEADER */

.popup-header{
text-align:center;
padding:14px;
font-weight:600;
border-bottom:1px solid #eee;
}

/* TABS */

.tabs{
display:flex;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
}

.tab.active{
background:#f5efe6;
font-weight:600;
}

/* LIST */

.list{
overflow:auto;
height:100%;
padding-bottom:60px;
}

/* ITEM */

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px 20px;
border-bottom:1px solid #eee;
position:relative;
cursor:pointer;
opacity:0;
transform:translateY(20px);
animation:itemIn .35s forwards;
}

@keyframes itemIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* DELETE BREAK */

.item.break{
animation:break .35s forwards;
}

@keyframes break{
to{
opacity:0;
transform:scale(.7) rotate(6deg);
}
}

.item img{
width:56px;
height:56px;
object-fit:cover;
border-radius:10px;
}

.item-content{
flex:1;
}

.item-name{
font-weight:600;
}

.item-detail{
opacity:.7;
font-size:14px;
}

.item-priority{
font-size:14px;
margin-top:2px;
}

/* DELETE */

.delete{
position:absolute;
right:4px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
font-size:18px;
color:#888;
display:none;
cursor:pointer;
}

.item.active .delete{
display:block;
}

/* HEART */

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:heartFly 1s ease forwards;
}

@keyframes heartFly{
0%{transform:translateY(0) scale(.4);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120px) scale(1.6);opacity:0;}
}

/* UNDO */

.undo{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:12px 16px;
border-radius:10px;
display:none;
gap:10px;
}

.undo button{
background:none;
border:none;
color:#ffd479;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h1>Wishlist của Nhím</h1>
<div>Mọi điều em muốn, anh sẽ nhớ 🤍</div>
</div>

<div class="wishlist-btn" onclick="togglePopup()">
Danh sách mong muốn ❤️ (<span id="count">0</span>)
</div>

<div class="container">

<div class="card">

<label>Tên món quà</label> <input id="name">

<label>Cụ thể</label>

<textarea id="detail"></textarea>

<label>Hình ảnh</label> <input type="file" id="image">

<label>Độ ưu tiên</label>

<select id="priority">
<option>🙄 Ước thôi</option>
<option>🤭 Thích nha</option>
<option>🥰 Muốn lắm</option>
</select>

<button onclick="addGift(event)">Thêm vào Wishlist</button>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-header">
Wishlist
</div>

<div class="tabs">

<div class="tab active" onclick="switchTab('all',event)">Tất cả</div>
<div class="tab" onclick="switchTab('🥰',event)">🥰</div>
<div class="tab" onclick="switchTab('🤭',event)">🤭</div>
<div class="tab" onclick="switchTab('🙄',event)">🙄</div>

</div>

<div id="list" class="list"></div>

</div>

<div class="undo" id="undoBar">
Đã xoá
<button onclick="undoDelete()">Hoàn tác</button>
</div>

<script>

let gifts=JSON.parse(localStorage.getItem("wishlist"))||[]
let currentTab="all"

let lastDeleted=null
let lastIndex=null

const list=document.getElementById("list")
const popup=document.getElementById("popup")
const undoBar=document.getElementById("undoBar")

/* HEART */

function heartEffect(x,y){

for(let i=0;i<6;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=(x+Math.random()*40-20)+"px"
h.style.top=(y+Math.random()*10)+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

}

/* CREATE ITEM */

function createItem(g,i){

let item=document.createElement("div")
item.className="item"

item.style.animationDelay=i*0.04+"s"

item.innerHTML=`

<img src="${g.image||''}">

<div class="item-content">

<div class="item-name">${g.name}</div>
<div class="item-detail">${g.detail||""}</div>
<div class="item-priority">${g.priority}</div>

</div>

<button class="delete">✕</button>

`

item.onclick=()=>{
document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"))
item.classList.add("active")
}

item.querySelector(".delete").onclick=(e)=>{
e.stopPropagation()
removeGift(i,item)
}

return item

}

/* RENDER */

function render(){

list.innerHTML=""

document.getElementById("count").innerText=gifts.length

gifts.forEach((g,i)=>{

if(currentTab!=="all" && !g.priority.includes(currentTab)) return

list.appendChild(createItem(g,i))

})

}

/* ADD */

function addGift(e){

let rect=e.target.getBoundingClientRect()

heartEffect(rect.left+rect.width/2,rect.top)

let name=document.getElementById("name").value
let detail=document.getElementById("detail").value
let priority=document.getElementById("priority").value

if(!name)return

gifts.push({name,detail,priority})

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

}

/* DELETE */

function removeGift(i,item){

lastDeleted=gifts[i]
lastIndex=i

item.classList.add("break")

setTimeout(()=>{

gifts.splice(i,1)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

undoBar.style.display="flex"

setTimeout(()=>undoBar.style.display="none",4000)

},300)

}

function undoDelete(){

if(lastDeleted){

gifts.splice(lastIndex,0,lastDeleted)

localStorage.setItem("wishlist",JSON.stringify(gifts))

render()

undoBar.style.display="none"

}

}

/* POPUP */

function togglePopup(){

popup.classList.toggle("active")

}

/* DRAG CLOSE */

let startY=0

popup.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

popup.addEventListener("touchmove",e=>{

let move=e.touches[0].clientY-startY

if(move>0){

popup.style.transform=`translateY(${move}px)`

}

})

popup.addEventListener("touchend",e=>{

let move=e.changedTouches[0].clientY-startY

if(move>120){

popup.classList.remove("active")

}

popup.style.transform=""

})

function switchTab(tab,e){

currentTab=tab

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

e.target.classList.add("active")

render()

}

render()

</script>

</body>
</html>
